<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公众号排版器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <h1>公众号排版器</h1>
    <div class="theme-bar">
      <button class="theme-btn active" data-theme="default">默认</button>
      <button class="theme-btn" data-theme="elegant">优雅</button>
      <button class="theme-btn" data-theme="modern">现代</button>
      <button class="theme-btn" data-theme="dark">暗色</button>
      <button class="theme-btn" data-theme="minimal">极简</button>
    </div>
    <button id="copyBtn" class="copy-btn">复制公众号格式</button>
  </div>
  <div class="main">
    <div class="editor-pane">
      <textarea id="editor" placeholder="输入 Markdown 内容...

# 标题
## 二级标题

**加粗** *斜体* ~~删除线~~

- 列表项
- 另一项

> 引用内容

`行内代码`"></textarea>
      <div class="stats" id="stats"></div>
    </div>
    <div class="preview-pane">
      <div id="preview"></div>
    </div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
